version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: todo_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    environment:
      CONFIG_PATH: config/config.docker.yaml
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:
